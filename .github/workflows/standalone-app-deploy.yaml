name: Standalone - Deploy to App Service

on:
  push:
      branches:
        - main
  workflow_dispatch:

jobs:
  deploy-to-app-service:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - name: Install node dependencies
        run: npm ci
        working-directory: ./src/spa

      - name: Build SPA
        run: npm run build
        working-directory: ./src/spa

      - name: dotnet publish
        run: dotnet publish src/api/LightSaver.csproj -c Release -o "${{env.DOTNET_ROOT}}/lightsaver-webapp"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID}}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: '${{ vars.DEPLOYMENT_NAME }}-webApp'
          slot-name: 'Production'
          package: ${{env.DOTNET_ROOT}}/lightsaver-webapp
