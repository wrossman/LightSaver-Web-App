name: Initial Deployment to Azure Step 2

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  create-db-webapp-user:
    uses: ./.github/workflows/create-db-webapp-user.yaml
    secrets: inherit
    with:
      deployment_name: ${{ vars.DEPLOYMENT_NAME }}

  deploy-app-service:
    needs: create-db-webapp-user
    uses: ./.github/workflows/deploy-app-service.yaml@main
    secrets: inherit
    with:
      deployment_name: ${{ vars.DEPLOYMENT_NAME }}